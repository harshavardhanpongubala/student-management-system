<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register Student | StudentHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">🎓 StudentHub</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="students.html">Students</a>
        <a href="register.html">Register</a>
    </nav>

    <a href="students.html" class="login-btn">View Records</a>
</header>

<!-- HERO -->
<section class="hero small-hero">
    <div class="hero-text">
        <h1>Student Registration</h1>
        <p>Add new student records securely to the cloud database.</p>
    </div>
</section>

<!-- FORM SECTION -->
<section class="card-section">

<form id="studentForm" onsubmit="return validateAndSubmit(event)">

    <h2 style="text-align:center; margin-bottom:20px;">
        Register New Student
    </h2>

    <!-- Name -->
    <label>Full Name *</label>
    <input
        type="text"
        id="name"
        placeholder="Enter full name"
    >
    <span class="error" id="nameError"></span>

    <!-- Email -->
    <label>Email *</label>
    <input
        type="text"
        id="email"
        placeholder="Enter email address"
    >
    <span class="error" id="emailError"></span>

    <!-- Roll -->
    <label>Roll Number *</label>
    <input
        type="text"
        id="roll"
        placeholder="e.g. 20230001"
    >
    <span class="error" id="rollError"></span>

    <!-- Phone -->
    <label>Phone Number *</label>
    <input
        type="text"
        id="phone"
        placeholder="10-digit mobile number"
    >
    <span class="error" id="phoneError"></span>

    <!-- Branch -->
    <label>Branch</label>
    <select id="branch">
        <option value="">Select Branch</option>
        <option>Computer Science</option>
        <option>Electronics</option>
        <option>Mechanical</option>
        <option>Civil</option>
        <option>Information Technology</option>
    </select>

    <!-- CGPA -->
    <label>CGPA *</label>
    <input
        type="text"
        id="cgpa"
        placeholder="0.0 - 10.0"
    >
    <span class="error" id="cgpaError"></span>

    <!-- Buttons -->
    <button type="submit" class="btn">
        Register Student
    </button>

    <button
        type="button"
        class="btn secondary"
        style="width:100%; margin-top:10px;"
        onclick="resetForm()"
    >
        Reset Form
    </button>

    <!-- Message -->
    <div id="successMsg"></div>

</form>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 StudentHub | Student Registration Portal</p>
</footer>

<script src="script.js"></script>
</body>
</html>
